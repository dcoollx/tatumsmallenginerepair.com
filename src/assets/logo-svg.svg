<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="cut">
      <!-- Visible area -->
      <rect width="512" height="512" fill="white"/>
      <!-- Rotated cut -->
      <g transform="rotate(90 256 256)">
        <rect x="245" y="0" width="20" height="512" fill="black"/>
      </g>
    </mask>
  </defs>

  <!-- Rotated shape with correctly oriented cut -->
  <g transform="rotate(90 256 256)" mask="url(#cut)">
    <polygon points="140,120 320,120 420,256 320,392 140,392 220,256"
             fill="#000000"/>
    <polygon points="220,170 300,170 350,256 300,342 220,342 260,256"
             fill="#000000"/>
  </g>
</svg>